name: Build Mesa Turnip Driver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-turnip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Enable ARM64 Multi-Arch
        run: |
          sudo dpkg --add-architecture arm64
          CODENAME=$(lsb_release -cs)
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s main restricted universe multiverse\ndeb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s-updates main restricted universe multiverse\n' \
            "$CODENAME" "$CODENAME" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            python3-mako \
            python3-ply \
            python3-yaml \
            bison \
            flex \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libwayland-dev \
            libdrm-dev \
            wayland-protocols \
            glslang-tools

      - name: Install latest Meson and Ninja
        run: python3 -m pip install --upgrade --break-system-packages meson ninja

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config

          SYSROOT="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          STUB_DIR=/usr/aarch64-linux-gnu/lib
          PC_DIR=/usr/aarch64-linux-gnu/lib/pkgconfig
          sudo mkdir -p "$STUB_DIR" "$PC_DIR"

          for lib in cutils hardware log sync nativewindow; do
           echo "void ${lib}_stub(void){}" | \
            aarch64-linux-gnu-gcc -x c - -shared -fPIC \
            -o /tmp/lib${lib}.so
            sudo install /tmp/lib${lib}.so "$STUB_DIR/lib${lib}.so"
            printf "Name: %s\nDescription: Android %s stub\nVersion: 28.0\nLibs: -L%s -l%s\nCflags: -I%s/usr/include\n" \
              "$lib" "$lib" "$STUB_DIR" "$lib" "$SYSROOT" \
              | sudo tee "$PC_DIR/${lib}.pc" > /dev/null
          done
         
      - name: Create Meson Cross-File
        run: |
           cat <<EOF > cross_aarch64.txt
           [binaries]
           c = 'aarch64-linux-gnu-gcc'
           cpp = 'aarch64-linux-gnu-g++'
           ar = 'aarch64-linux-gnu-ar'
           strip = 'aarch64-linux-gnu-strip'
           pkgconfig = 'pkg-config'

           [properties]
           needs_exe_wrapper = true
           pkg_config_libdir = '/usr/aarch64-linux-gnu/lib/pkgconfig:/usr/share/pkgconfig'

           [host_machine]
           system = 'linux'
           cpu_family = 'aarch64'
           cpu = 'armv8-a'
           endian = 'little'
           EOF

      - name: Configure Build
        run: |
          meson setup build \
            --cross-file cross_aarch64.txt \
            -D buildtype=release \
            -D vulkan-drivers=freedreno \
            -D gallium-drivers=softpipe \
            -D freedreno-kmds=kgsl \
            -D platforms=android \
            -D shared-glapi=enabled \
            -D gles1=disabled \
            -D gles2=disabled \
            -D egl=disabled \
            -D glx=disabled \
            -D opengl=disabled

      - name: Compile Drivers
        run: ninja -C build

      - name: Upload Driver Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: turnip-vulkan-driver
          path: |
            build/src/freedreno/vulkan/libvulkan_freedreno.so
            build/src/freedreno/vulkan/freedreno_icd.*.json

      - name: Package Driver and Generate meta.json
        run: |
          # Create a clean packaging directory
          mkdir -p dist
          
          # Copy the driver binary
          cp build/src/freedreno/vulkan/libvulkan_freedreno.so dist/libvulkan_freedreno.so
          
          # Generate the meta.json file required by driver managers
          cat <<EOF > dist/meta.json
          {
            "schemaVersion": 1,
            "name": "Turnip-A810-V${{ github.run_number }}",
            "description": "Messy Adreno 810 hacks",
            "author": "${{ github.actor }}",
            "packageVersion": "${{ github.run_number }}",
            "vendor": "Mesa",
            "driverVersion": "Revision ${{ github.run_number }}",
            "minApi": 28,
            "libraryName": "libvulkan_freedreno.so"
          }
          EOF

          # Compress the directory into a zip archive
          cd dist
          zip -r ../Turnip-A810-V${{ github.run_number }}.zip libvulkan_freedreno.so meta.json

      - name: Upload Packaged Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Turnip-A810-V${{ github.run_number }}
          path: Turnip-A810-V${{ github.run_number }}.zip
