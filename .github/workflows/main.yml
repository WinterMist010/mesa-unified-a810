name: Build Turnip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            meson \
            ninja-build \
            pkg-config \
            python3-pip \
            python3-mako \
            python3-yaml \
            bison \
            flex \
            gettext \
            libdrm-dev \
            libexpat1-dev \
            libzstd-dev \
            zip

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.2.12479018"

      - name: Set NDK path
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Generate Android cross file
        run: |
          cat > android-aarch64.ini << EOF
          [binaries]
          c = '${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang'
          cpp = '${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++'
          ar = '${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          pkgconfig = '/usr/bin/pkg-config'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [properties]
          needs_exe_wrapper = true
          EOF

      - name: Configure Mesa
        run: |
          meson setup build \
            --cross-file android-aarch64.ini \
            --buildtype=release \
            -Dplatforms=android \
            -Dvulkan-drivers=freedreno \
            -Dfreedreno-kmds=kgsl \
            -Dgallium-drivers= \
            -Dllvm=disabled \
            -Dshared-glapi=disabled \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled

      - name: Build
        run: |
          ninja -C build

      - name: Find Turnip library
        run: |
          find build -name "libvulkan*" -type f

      - name: Package
        run: |
         mkdir -p artifact

         DRIVER=$(find build -name "libvulkan_freedreno.so*" | head -n 1)

         if [ -z "$DRIVER" ]; then
           echo "Turnip library not found"
           exit 1
         fi

         cp "$DRIVER" artifact/libvulkan_freedreno.so

         cat > artifact/meta.json << EOF
         {
           "schemaVersion": 1,
           "name": "Turnip-A810-V${{ github.run_number }}",
           "description": "Messy Adreno 810 hacks",
           "author": "${{ github.actor }}",
           "packageVersion": "${{ github.run_number }}",
           "vendor": "Mesa",
           "driverVersion": "Revision ${{ github.run_number }}",
           "minApi": 28,
           "libraryName": "libvulkan_freedreno.so"
         }
         EOF

         cd artifact
         zip -r Turnip-A810-V${{ github.run_number }}.zip \
           libvulkan_freedreno.so \
           meta.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
           name: Turnip-A810-V${{ github.run_number }}
           path: artifact/Turnip-A810-V${{ github.run_number }}.zip
